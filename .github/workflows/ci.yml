name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build test library
        run: cargo build --release
        working-directory: test-lib

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm --filter @tt23xrstudio/senri_ffi exec tsc --noEmit

      - name: Node.js tests
        run: pnpm test:all

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Bun tests
        working-directory: packages/senri_ffi_js
        run: bun test src/__tests__/bun-ffi.test.ts

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Deno tests
        working-directory: packages/senri_ffi_js
        run: deno test --no-check --allow-ffi --allow-read --sloppy-imports src/__tests__/deno-ffi.test.ts
