<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TestReport Index — SenRi FFI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f7fa;
    --card: #ffffff;
    --border: #e0e4ea;
    --text: #1a2332;
    --muted: #6b7a8f;
    --accent: #3b82f6;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,.08);
    --hover-bg: #f8fafc;
    --th-bg: #fafbfc;
    --track-bg: #eef1f5;
    --badge-bg: #eef1f5;
    --badge-pass-bg: #d1fae5; --badge-pass-fg: #065f46;
    --badge-skip-bg: #fef3c7; --badge-skip-fg: #92400e;
    --badge-fail-bg: #fee2e2; --badge-fail-fg: #991b1b;
    --badge-os-bg: #dbeafe;   --badge-os-fg: #1e40af;
  }
  [data-theme="dark"] {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #60a5fa;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --shadow: 0 1px 3px rgba(0,0,0,.4);
    --hover-bg: #1e293b;
    --th-bg: #1a2332;
    --track-bg: #1a2332;
    --badge-bg: #334155;
    --badge-pass-bg: #064e3b; --badge-pass-fg: #6ee7b7;
    --badge-skip-bg: #78350f; --badge-skip-fg: #fcd34d;
    --badge-fail-bg: #7f1d1f; --badge-fail-fg: #fca5a5;
    --badge-os-bg: #1e3a5f;   --badge-os-fg: #93c5fd;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    line-height: 1.6;
  }
  .container { max-width: 960px; margin: 0 auto; }

  .header {
    background: linear-gradient(135deg, #1e3a5f, #2563eb);
    color: #fff;
    padding: 32px 36px;
    border-radius: var(--radius);
    margin-bottom: 24px;
    box-shadow: 0 4px 12px rgba(37,99,235,.25);
  }
  .header h1 { font-size: 26px; margin-bottom: 4px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .header .sub { opacity: .78; font-size: 14px; margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px 24px; }
  .header .sub span { display: inline-flex; align-items: center; gap: 6px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }

  .section-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  .version-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .version-header {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  .version-header h2 { font-size: 18px; }
  .version-header h2 code { font-weight: 700; }
  .version-header .date { font-size: 13px; color: var(--muted); }

  .platforms { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }

  .platform-card {
    display: flex; flex-direction: column;
    padding: 16px 18px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--hover-bg);
    text-decoration: none;
    color: var(--text);
    transition: box-shadow .2s, transform .15s;
  }
  .platform-card:hover {
    box-shadow: var(--shadow);
    transform: translateY(-2px);
    border-color: var(--accent);
  }
  .platform-card .top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .platform-card .os-icon { font-size: 22px; }
  .platform-card .os-name { font-size: 15px; font-weight: 600; }
  .platform-card .badge { padding: 1px 8px; border-radius: 10px; font-weight: 600; font-size: 11px; }
  .platform-card .badge.pass { background: var(--badge-pass-bg); color: var(--badge-pass-fg); }
  .platform-card .badge.skip { background: var(--badge-skip-bg); color: var(--badge-skip-fg); }
  .platform-card .badge.fail { background: var(--badge-fail-bg); color: var(--badge-fail-fg); }
  .platform-card .meta { font-size: 12px; color: var(--muted); display: flex; gap: 6px 16px; flex-wrap: wrap; }
  .platform-card .meta span { display: inline-flex; align-items: center; gap: 4px; }
  .platform-card .arrow { margin-left: auto; font-size: 18px; color: var(--muted); transition: color .2s; }
  .platform-card:hover .arrow { color: var(--accent); }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .theme-btn {
    background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
    color: #fff; font-size: 20px; line-height: 1; padding: 6px 12px;
    border-radius: 8px; cursor: pointer; transition: background .2s;
  }
  .theme-btn:hover { background: rgba(255,255,255,.3); }

  @media (max-width: 640px) {
    body { padding: 12px; }
    .header { padding: 20px; }
    .header h1 { font-size: 20px; }
    .platforms { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container" id="app">

  <div class="header">
    <div class="header-top">
      <h1>
        SenRi FFI 测试报告
      </h1>
      <button id="themeToggle" class="theme-btn" onclick="toggleTheme()" title="切换亮色/暗色模式">&#127769;</button>
    </div>
    <div class="sub">
      <span>@tt23xrstudio/senri_ffi</span>
      <span id="reportCount">加载中...</span>
    </div>
  </div>

  <div id="content">
    <div class="empty-state">
      <div class="icon">&#128202;</div>
      <p>正在加载报告数据...</p>
    </div>
  </div>

</div>

<script>
const REPORTS = [
  {
    version: '0.1.0-dev.1',
    date: '2026-06-01',
    platforms: [
      {
        name: 'Windows',
        href: '0.1.0-dev.1/Windows.html',
        md: '0.1.0-dev.1/Windows.md',
        os: 'Windows 11 (x64)',
        runtime: 'Node.js v24.16.0 / Bun v1.3.14 / Deno 2.8.1',
        passed: 86, skipped: 6, failed: 0,
      },
      {
        name: 'Linux',
        href: '0.1.0-dev.1/Linux.html',
        md: '0.1.0-dev.1/Linux.md',
        os: 'Ubuntu 24.04.4 LTS (x64) (WSL)',
        runtime: 'Node.js v24.16.0 / Bun v1.3.14 / Deno 2.8.1',
        passed: 86, skipped: 6, failed: 0,
      },
    ],
  },
];

function render() {
  const container = document.getElementById('content');

  if (!REPORTS || REPORTS.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>暂无测试报告</p></div>';
    return;
  }

  let html = '';

  REPORTS.forEach(ver => {
    const totalPass = ver.platforms.reduce((s, p) => s + p.passed, 0);
    const totalSkip = ver.platforms.reduce((s, p) => s + p.skipped, 0);
    const totalFail = ver.platforms.reduce((s, p) => s + p.failed, 0);

    html += `<div class="version-card">
      <div class="version-header">
        <h2><code>${ver.version}</code></h2>
        <span class="date">${ver.date}</span>
      </div>
      <div class="platforms">`;

    ver.platforms.forEach(p => {
      const passPct = ((p.passed / (p.passed + p.skipped + p.failed)) * 100).toFixed(1);
      html += `<a class="platform-card" href="${p.href}">
        <div class="top">
          <span class="os-name">${p.name}</span>
          <span class="badge pass">${p.passed} 通过</span>
          <span class="badge skip">${p.skipped} 跳过</span>
          ${p.failed > 0 ? `<span class="badge fail">${p.failed} 失败</span>` : ''}
          <span class="arrow">&#8599;</span>
        </div>
        <div class="meta">
          <span>${p.os}</span>
          <span>&#9679; 通过率 ${passPct}%</span>
        </div>
        <div class="meta">
          <span>${p.runtime}</span>
        </div>
      </a>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
  document.getElementById('reportCount').textContent = `${REPORTS.length} 个版本`;
}

function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('themeToggle');
  if (html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme');
    btn.innerHTML = '&#127769;';
    localStorage.setItem('senri-theme', 'light');
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.innerHTML = '&#127774;';
    localStorage.setItem('senri-theme', 'dark');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('senri-theme');
  const btn = document.getElementById('themeToggle');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    btn.innerHTML = '&#127774;';
  } else {
    btn.innerHTML = '&#127769;';
  }
  render();
});
</script>
</body>
</html>
