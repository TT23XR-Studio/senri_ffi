[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "senri-ffi"
version = "0.1.0"
description = "Unified FFI library for Python"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.13"
authors = [
    { name = "TT23XR Studio" },
]
keywords = ["ffi", "ctypes", "native", "c", "dlopen"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = []

[project.optional-dependencies]
cffi = ["cffi>=1.17.0"]
dev = ["pytest>=7.0.0", "ruff>=0.6.0"]

[project.urls]
Source = "https://github.com/TT23XR-Studio/senri_ffi"

[tool.hatch.build.targets.wheel]
packages = ["src/senri_ffi"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py313"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.ruff.format]
quote-style = "double"
